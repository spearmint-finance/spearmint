  /api/scenario-templates:
    get:
      summary: List Scenario Templates
      parameters:
        - name: page
          in: query
          schema:
            type: integer
          example: '1'
        - name: pageSize
          in: query
          schema:
            type: integer
          example: '20'
      responses:
        '200':
          description: 200 OK - Scenario templates list
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        name:
                          type: string
                        description:
                          type: string
                        adjusters:
                          type: array
                          items:
                            type: object
                            properties:
                              type:
                                type: string
                              key:
                                type: string
                              label:
                                type: string
                              default:
                                type: number
                              min:
                                type: integer
                              max:
                                type: number
                  page:
                    type: integer
                  pageSize:
                    type: integer
                  total:
                    type: integer
              example:
                items:
                  - id: stpl_2f1f4d7e-9c0e-4a8a-9b63-1a2c77c7a1d3
                    name: Baseline Pricing Scenario
                    description: >-
                      Creates a baseline scenario with default pricing
                      adjusters.
                    adjusters:
                      - type: percentage
                        key: base_margin
                        label: Base margin
                        default: 0.12
                        min: 0
                        max: 0.5
                      - type: fixed
                        key: shipping_fee
                        label: Shipping fee
                        default: 4.99
                        currency: USD
                        min: 0
                        max: 50
                  - id: stpl_7b6b7f3a-5b5e-4c4e-9b0b-6a9d07a2d5df
                    name: Promo Lift Scenario
                    description: >-
                      Scenario template for promotional price lift and
                      guardrails.
                    adjusters:
                      - type: percentage
                        key: promo_lift
                        label: Promo lift
                        default: 0.05
                        min: -0.5
                        max: 0.5
                      - type: boolean
                        key: cap_prices
                        label: Cap prices
                        default: true
                page: 1
                pageSize: 20
                total: 2
        '401':
          description: 401 Unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string
              example:
                error:
                  code: UNAUTHORIZED
                  message: Missing or invalid access token.
      tags:
        - scenarios
      description: >-
        List available scenario templates used by the "create scenario from
        template" workflow. Supports basic pagination via query params.
