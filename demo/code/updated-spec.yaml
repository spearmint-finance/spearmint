openapi: 3.0.0
info:
  title: Spearmint Core API
  version: 1.0.0
  description: >-
    # Spearmint Core API


    A comprehensive REST API for financial transaction analysis and management.


    ## Features


    ### Transaction Management


    - Import transactions from CSV files
        
    - CRUD operations for transactions and categories
        
    - Advanced filtering and search capabilities
        

    ### Analysis & Insights


    - Income and expense analysis with category breakdowns
        
    - Cash flow analysis and trends
        
    - Financial health indicators
        
    - Time-series analysis (daily, weekly, monthly, quarterly, yearly)
        

    ### Relationship Detection


    - Automatic transfer pair detection
        
    - Credit card payment/receipt matching
        
    - Reimbursement pair detection
        
    - Manual relationship management
        

    ### Projections & Forecasting


    - Income and expense projections
        
    - Cash flow forecasting
        
    - Multiple projection algorithms (linear regression, moving average,
    exponential smoothing, weighted average)
        
    - Scenario analysis (best case, worst case, expected)
        
    - Accuracy metrics (MAPE, RMSE, MAE, R-squared)
        

    ### Reporting & Export


    - Summary reports with key metrics
        
    - Detailed income/expense reports
        
    - Reconciliation reports
        
    - Export to JSON and CSV formats
        

    ### Classification System


    - 10 system classifications for transaction types
        
    - Custom user-defined classifications
        
    - Pattern-based classification rules
        
    - Bulk and automatic classification
        
    - Classification-aware calculations
        

    ### Error Handling & Logging


    - Standardized error responses with detailed error codes
        
    - Comprehensive request/response logging
        
    - Performance monitoring
        
    - Audit trail for data modifications
        

    ## Analysis Modes


    The API supports two analysis modes:


    - **ANALYSIS** (default) - Excludes transfers, reimbursements, and other
    non-income/expense transactions for accurate financial analysis
        
    - **COMPLETE** - Includes all transactions for reconciliation and complete
    transaction history
        

    ## Authentication


    Currently, the API does not require authentication. Authentication will be
    added in a future release.


    ## Rate Limiting


    Currently, there are no rate limits. Rate limiting will be added in a future
    release.


    ## Support


    For issues, questions, or feature requests, please contact the development
    team.


    ---

    ## Version History


    **Current Version:** v0.0.72 (updated 2026-03-13)


    *Spec version history available via Git tags.*
