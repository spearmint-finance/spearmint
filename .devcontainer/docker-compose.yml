version: '3.8'

services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - ..:/workspace:cached
      - core-api-venv:/workspace/core-api/venv
      - web-app-node-modules:/workspace/web-app/node_modules
      - worktree-cli-node-modules:/workspace/worktree-cli/node_modules
    ports:
      # Main project
      - "8000:8000"
      - "5173:5173"
      # Worktrees (8001-8005 backend, 5174-5178 frontend)
      - "8001:8001"
      - "8002:8002"
      - "8003:8003"
      - "8004:8004"
      - "8005:8005"
      - "5174:5174"
      - "5175:5175"
      - "5176:5176"
      - "5177:5177"
      - "5178:5178"
    command: sleep infinity

volumes:
  core-api-venv:
  web-app-node-modules:
  worktree-cli-node-modules:
