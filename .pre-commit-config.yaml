# Pre-commit hooks configuration
# Install: pip install pre-commit
# Setup: pre-commit install
# Run manually: pre-commit run --all-files

repos:
  # Comprehensive API validation test suite with detailed logging
  - repo: local
    hooks:
      - id: api-validation-suite
        name: API Validation Suite (Structural + Spectral + Postman)
        entry: python core-api/scripts/api_validation/run_all_validations.py
        language: system
        always_run: true
        pass_filenames: false
        verbose: true

  # Individual hooks (can be run separately if needed)
  # OpenAPI generation hook
  - repo: local
    hooks:
      - id: openapi-generation
        name: OpenAPI Generation
        entry: python core-api/scripts/api_validation/api_validation.py --generate --output sdk/openapi.json
        language: system
        files: ^core-api/src/financial_analysis/api/.*\.py$
        stages: [manual]
        pass_filenames: false
        verbose: true

  # OpenAPI spec validation hook (Postman governance rules)
  - repo: local
    hooks:
      - id: openapi-spec-validation
        name: OpenAPI Spec Validation (Postman)
        entry: python core-api/scripts/api_validation/postman_validation.py --spec-file sdk/openapi.json --fail-severity WARNING
        language: system
        files: ^sdk/openapi\.json$
        stages: [manual]
        pass_filenames: false
        verbose: true
