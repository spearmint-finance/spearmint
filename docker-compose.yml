version: '3.8'

# ================================================================
# PORT CONFIGURATION
# ================================================================
# Defaults use the 7xxx range to avoid conflicts with local dev:
#   Local dev:  API=8000, Frontend=5173, MCP=3001
#   Docker:     Gateway=7080, Frontend=7173, MCP=7001, Marketing=7300, DB=7432
#
# Override in a .env file if needed:
#   GATEWAY_PORT=7080
#   WEB_PORT=7173
#   MCP_PORT=7001
#   MARKETING_PORT=7300
#   DB_PORT=7432
# ================================================================

services:
  # ----------------------------------------------------------------
  # API GATEWAY (Entry Point)
  # ----------------------------------------------------------------
  gateway:
    build: ./api-gateway
    ports:
      - "${GATEWAY_PORT:-7080}:8080"
    depends_on:
      core-api:
        condition: service_healthy
      web-app:
        condition: service_started

  # ----------------------------------------------------------------
  # CORE API (Backend Service)
  # ----------------------------------------------------------------
  core-api:
    build:
      context: ./core-api
      network: host
    dns:
      - 8.8.8.8
      - 8.8.4.4
    volumes:
      - ./core-api/src:/app/src  # Hot reload for code
      - ./database/data:/app/data # Persist SQLite DB
    environment:
      - APP_ENV=local
      - DEBUG=true
      - DATABASE_URL=sqlite:////app/data/financial_data.db
      - OPENAI_API_KEY=${OPENAI_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_KEY}
    # Pass --reload to entrypoint for hot reloading in dev
    command: ["--reload"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ----------------------------------------------------------------
  # WEB APP (Frontend Service)
  # ----------------------------------------------------------------
  web-app:
    build:
      context: .
      dockerfile: web-app/Dockerfile.dev  # Use dev Dockerfile for hot reload
    volumes:
      - ./web-app/src:/app/src           # Mount source code for hot reload
      - ./web-app/public:/app/public     # Mount public assets
      - /app/node_modules                # Prevent overwriting node_modules
    ports:
      - "${WEB_PORT:-7173}:5173"
    environment:
      - VITE_API_URL=http://localhost:${GATEWAY_PORT:-7080}

  # ----------------------------------------------------------------
  # MCP SERVER (AI Agent Integration)
  # ----------------------------------------------------------------
  mcp-server:
    build: ./mcp-server
    ports:
      - "${MCP_PORT:-7001}:3001"
    environment:
      - SPEARMINT_API_URL=http://core-api:8000
      - MCP_PORT=3001
      - MCP_MODE=http
    depends_on:
      core-api:
        condition: service_healthy

  # ----------------------------------------------------------------
  # MARKETING SITE (Static Next.js Site)
  # ----------------------------------------------------------------
  marketing-site:
    build: ./marketing-site
    ports:
      - "${MARKETING_PORT:-7300}:3000"

  # ----------------------------------------------------------------
  # DATABASE (Postgres - Future Proofing)
  # ----------------------------------------------------------------
  # Using SQLite file mount for now as per current setup,
  # but adding postgres here so we are ready to switch.
  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-spearmint}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-spearmint}
      - POSTGRES_DB=${POSTGRES_DB:-spearmint}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-7432}:5432"

volumes:
  postgres_data:
