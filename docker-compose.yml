version: '3.8'

# ================================================================
# PORT CONFIGURATION
# ================================================================
# Override these in a .env file to avoid conflicts with other instances:
#   GATEWAY_PORT=8090
#   WEB_PORT=5183
#   MCP_PORT=3011
#   DB_PORT=5442
#   MARKETING_PORT=3010
# ================================================================

services:
  # ----------------------------------------------------------------
  # API GATEWAY (Entry Point)
  # ----------------------------------------------------------------
  gateway:
    build: ./api-gateway
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    depends_on:
      core-api:
        condition: service_healthy
      web-app:
        condition: service_started

  # ----------------------------------------------------------------
  # CORE API (Backend Service)
  # ----------------------------------------------------------------
  core-api:
    build:
      context: ./core-api
      network: host
    dns:
      - 8.8.8.8
      - 8.8.4.4
    volumes:
      - ./core-api/src:/app/src  # Hot reload for code
      - ./database/data:/app/data # Persist SQLite DB
    environment:
      - APP_ENV=local
      - DEBUG=true
      - DATABASE_URL=sqlite:////app/data/financial_data.db
    # Pass --reload to entrypoint for hot reloading in dev
    command: ["--reload"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ----------------------------------------------------------------
  # WEB APP (Frontend Service)
  # ----------------------------------------------------------------
  web-app:
    build:
      context: .
      dockerfile: web-app/Dockerfile.dev  # Use dev Dockerfile for hot reload
    volumes:
      - ./web-app/src:/app/src           # Mount source code for hot reload
      - ./web-app/public:/app/public     # Mount public assets
      - /app/node_modules                # Prevent overwriting node_modules
    ports:
      - "${WEB_PORT:-5173}:5173"
    environment:
      - VITE_API_URL=http://localhost:${GATEWAY_PORT:-8080}

  # ----------------------------------------------------------------
  # MARKETING SITE (Static Next.js)
  # ----------------------------------------------------------------
  marketing-site:
    build: ./marketing-site
    ports:
      - "${MARKETING_PORT:-3000}:3000"

  # ----------------------------------------------------------------
  # MCP SERVER (AI Agent Integration)
  # ----------------------------------------------------------------
  mcp-server:
    build: ./mcp-server
    ports:
      - "${MCP_PORT:-3001}:3001"
    environment:
      - SPEARMINT_API_URL=http://core-api:8000
      - MCP_PORT=3001
      - MCP_MODE=http
    depends_on:
      core-api:
        condition: service_healthy

  # ----------------------------------------------------------------
  # DATABASE (Postgres - Future Proofing)
  # ----------------------------------------------------------------
  # Using SQLite file mount for now as per current setup,
  # but adding postgres here so we are ready to switch.
  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=spearmint
      - POSTGRES_PASSWORD=spearmint
      - POSTGRES_DB=spearmint
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"

volumes:
  postgres_data:
