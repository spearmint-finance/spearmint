name: Deploy Marketing Site

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - marketing-production
    paths:
      - 'marketing-site/**'
      - '.github/workflows/marketing-site-deploy.yml'

concurrency:
  group: marketing-deploy-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read
  deployments: write

jobs:
  build-and-deploy:
    if: false # Disabled until CLOUDFLARE_API_TOKEN secret is configured
    runs-on: depot-ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: marketing-site
        run: npm ci

      - name: Build static site
        working-directory: marketing-site
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy marketing-site/out --project-name=spearmint-marketing-site --branch=${{ github.ref_name }}
