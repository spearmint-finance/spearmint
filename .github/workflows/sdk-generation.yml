name: SDK Generation (Hybrid)

on:
  push:
    branches: [ "main" ]
    paths:
      - 'core-api/**'
      - 'sdk/liblab.config.json'
      - '.github/workflows/sdk-generation.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-sdk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    services:
      pass:
        image: alpine

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install LibLab CLI
        run: npm install -g liblab

      - name: Generate OpenAPI Spec from Core API
        run: |
          cd core-api
          pip install -r requirements.txt
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          python scripts/generate_openapi.py ../sdk/openapi.json
          cd ..

      - name: Build Python SDK with LibLab
        env:
          LIBLAB_TOKEN: ${{ secrets.LIBLAB_TOKEN }}
        working-directory: ./sdk
        run: |
          # Ensure config points to the local file we just generated
          sed -i 's|"specFilePath": ".*"|"specFilePath": "./openapi.json"|' liblab.config.json
          
          # Build Python only (as configured in liblab.config.json)
          liblab build

      - name: Build TypeScript SDK with OpenAPI Generator
        uses: openapi-generators/openapitools-generator-action@v1
        with:
          generator: typescript-fetch
          openapi-file: sdk/openapi.json
          command-args: >-
            --package-name @spearmint-money/sdk
            --output sdk/typescript
            --additional-properties=typescriptThreePlus=true,supportsES6=true,npmName=@spearmint-money/sdk,npmVersion=0.1.0

      - name: Commit Generated SDKs
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(sdk): Auto-generate SDKs (LibLab Python + OpenAPI TS)"
          file_pattern: 'sdk/python/** sdk/typescript/**'
