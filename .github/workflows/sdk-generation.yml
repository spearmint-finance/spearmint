name: SDK Generation (LibLab)

on:
  push:
    branches: [ "main" ]
    paths:
      - 'core-api/**'
      - 'sdk/liblab.config.json'
      - '.github/workflows/sdk-generation.yml'
  workflow_dispatch:

jobs:
  generate-sdk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    services:
      pass:
        image: alpine

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install LibLab CLI
        run: npm install -g liblab

      - name: Generate OpenAPI Spec from Core API
        run: |
          cd core-api
          pip install -r requirements.txt
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          
          # create a temporary python script to write the spec to a file
          # this avoids capturing stdout logs (startup messages) in the json
          cat <<EOF > generate_spec.py
import json
import sys
import logging

# Suppress logging during import
logging.disable(logging.CRITICAL)

try:
    from src.financial_analysis.api.main import app
    
    with open('../sdk/openapi.json', 'w') as f:
        json.dump(app.openapi(), f, indent=2)
    print("Successfully generated ../sdk/openapi.json")
except Exception as e:
    print(f"Error generating spec: {e}")
    sys.exit(1)
EOF
          
          python generate_spec.py
          cd ..

      - name: Verify Spec Content
        run: head -n 5 sdk/openapi.json

      - name: Build SDKs with LibLab
        env:
          LIBLAB_TOKEN: ${{ secrets.LIBLAB_TOKEN }}
        working-directory: ./sdk
        run: |
          # Ensure config points to the local file we just generated
          sed -i 's|"specFilePath": ".*"|"specFilePath": "./openapi.json"|' liblab.config.json
          
          liblab build

      - name: Commit Generated SDKs
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(sdk): Auto-generate SDKs via LibLab"
          file_pattern: 'sdk/python/** sdk/typescript/**'
