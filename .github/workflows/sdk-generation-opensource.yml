name: SDK Generation (Open Source)

on:
  push:
    branches: [ "main" ]
    paths:
      - 'core-api/**'
      - '.github/workflows/sdk-generation-opensource.yml'
  workflow_dispatch:

jobs:
  generate-sdk-oss:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Generate OpenAPI Spec from Core API
        run: |
          cd core-api
          pip install -r requirements.txt
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          python scripts/generate_openapi.py ../sdk/openapi.json
          cd ..

      - name: Generate Python SDK
        uses: openapi-generators/openapitools-generator-action@v1
        with:
          generator: python
          openapi-file: sdk/openapi.json
          command-args: >-
            --package-name spearmint_sdk
            --output sdk/python
            --global-property skipFormModel=false

      - name: Generate TypeScript SDK
        uses: openapi-generators/openapitools-generator-action@v1
        with:
          generator: typescript-fetch
          openapi-file: sdk/openapi.json
          command-args: >-
            --package-name @spearmint-money/sdk
            --output sdk/typescript
            --additional-properties=typescriptThreePlus=true,supportsES6=true,npmName=@spearmint-money/sdk,npmVersion=0.1.0

      - name: Commit Generated SDKs
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(sdk): Auto-generate SDKs via OpenAPI Generator"
          file_pattern: 'sdk/python/** sdk/typescript/**'
