name: Deploy, Version Bump, and Postman Collection

on:
  push:
    branches:
      - main
    paths:
      - 'core-api/**'
      - 'web-app/**'
      - 'sdk/**'
      - 'dev-tools/**'  # Include dev-tools changes to trigger workflow for publishing scripts
      - '.github/workflows/deploy-and-version.yml'

permissions:
  contents: write
  pull-requests: write

jobs:
  # STEP 1: Run integration tests (can run in parallel with spec generation)
  integration-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd core-api
          pip install -r requirements.txt
          pip install -e .

      - name: Run integration tests
        run: |
          set -e
          cd core-api
          export PYTHONPATH=$PYTHONPATH:$(pwd)/src
          pytest tests/ -v --tb=short

  # STEP 1: Generate and validate OpenAPI spec (runs in parallel with tests)
  generate-and-validate-spec:
    runs-on: ubuntu-latest
    outputs:
      spec_valid: ${{ steps.validate.outcome == 'success' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Generate OpenAPI Spec
        run: |
          set -e
          cd core-api
          pip install -r requirements.txt
          pip install -e .
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          python scripts/generate_openapi.py ../sdk/openapi.json
          echo "✓ OpenAPI spec generated successfully"

      - name: Validate OpenAPI Spec Structure (Syntax & Schema)
        run: |
          set -e
          cd core-api
          pip install openapi-spec-validator
          echo "Running OpenAPI structure validation..."
          python scripts/api_validation/api_validation.py --file ../sdk/openapi.json
          echo "✓ OpenAPI structure validation passed"

      - name: Install Postman CLI
        run: |
          curl -o- "https://dl-cli.pstmn.io/install/linux64.sh" | sh
          echo "$HOME/.postman/bin" >> $GITHUB_PATH
          echo "✓ Postman CLI installed"

      - name: Login to Postman
        run: |
          export PATH="$HOME/.postman/bin:$PATH"
          postman login --with-api-key ${{ secrets.POSTMAN_API_KEY }}
          echo "✓ Logged in to Postman"

      - name: Validate spec against Postman governance & security rules
        id: validate
        run: |
          set -e
          export PATH="$HOME/.postman/bin:$PATH"
          echo "Running Postman governance and security validation..."
          echo "Workspace ID: ${{ secrets.POSTMAN_WORKSPACE_ID }}"
          echo "Fail severity: ERROR"
          echo ""
          python core-api/scripts/api_validation/postman_validation.py \
            --spec-file sdk/openapi.json \
            --workspace-id "${{ secrets.POSTMAN_WORKSPACE_ID }}" \
            --fail-severity ERROR \
            --output-file spec-validation-results.json
          echo ""
          echo "✓ Postman validation completed"

      - name: Upload OpenAPI spec artifact
        uses: actions/upload-artifact@v4
        with:
          name: openapi-spec
          path: sdk/openapi.json
          retention-days: 7

      - name: Upload validation results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spec-validation-results
          path: spec-validation-results.json
          retention-days: 30

      - name: Add validation summary to GitHub Actions
        if: always()
        run: |
          echo "## 📋 OpenAPI Spec Validation Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Validations Performed:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "1. ✅ **OpenAPI Structure Validation** - Syntax and schema validation" >> $GITHUB_STEP_SUMMARY
          echo "2. 🔍 **Postman Governance Rules** - API design standards" >> $GITHUB_STEP_SUMMARY
          echo "3. 🔒 **Postman Security Rules** - OWASP API Security Top 10" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f spec-validation-results.json ]; then
            VIOLATIONS=$(python -c "import json; data=json.load(open('spec-validation-results.json')); print(len(data.get('violations', [])))")
            if [ "$VIOLATIONS" -eq 0 ]; then
              echo "### ✅ **ALL VALIDATIONS PASSED**" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "No governance or security violations found!" >> $GITHUB_STEP_SUMMARY
            else
              echo "### ❌ **VALIDATION FAILED**" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "Found **$VIOLATIONS violation(s)** in Postman governance/security checks:" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              python -c "
          import json
          data = json.load(open('spec-validation-results.json'))
          for i, v in enumerate(data.get('violations', []), 1):
              print(f\"{i}. **{v.get('severity', 'UNKNOWN')}** - Line {v.get('line number', 'N/A')}\")
              print(f\"   - File: \`{v.get('file', 'N/A')}\`\")
              print(f\"   - Path: \`{v.get('path', 'N/A')}\`\")
              print(f\"   - Issue: {v.get('issue', 'N/A')}\")
              print()
          " >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "⚠️ **WARNING**: Validation results file not found" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "The Postman validation may have failed to run or produce output." >> $GITHUB_STEP_SUMMARY
          fi

  # STEP 2: Deploy API Gateway (only if tests and spec validation pass)
  deploy-gateway:
    needs: [integration-tests, generate-and-validate-spec]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image for API Gateway
        run: |
          set -e
          cd api-gateway
          docker build -t spearmint-api-gateway:latest .

      - name: Verify gateway deployment
        run: echo "✓ Gateway deployed successfully"

      # TODO: Add actual deployment steps here
      # - name: Deploy to production
      #   run: |
      #     # Deploy to your cloud provider
      #     # kubectl apply -f k8s/
      #     # or similar deployment commands

  # STEP 3: Build SDK with LibLab (only if gateway deployed successfully)
  build-sdk:
    needs: deploy-gateway
    runs-on: ubuntu-latest
    outputs:
      sdk_built: ${{ steps.build.outputs.success }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Download OpenAPI spec artifact
        uses: actions/download-artifact@v4
        with:
          name: openapi-spec
          path: sdk/

      - name: Install LibLab CLI
        run: npm install -g liblab

      - name: Build SDK with LibLab
        id: build
        env:
          LIBLAB_TOKEN: ${{ secrets.LIBLAB_TOKEN }}
        working-directory: ./sdk
        run: |
          set -e
          sed -i 's|"specFilePath": ".*"|"specFilePath": "./openapi.json"|' liblab.config.json
          liblab build
          echo "success=true" >> $GITHUB_OUTPUT

      - name: Verify SDK build
        run: echo "✓ SDK built successfully"

      - name: Upload SDK artifact
        uses: actions/upload-artifact@v4
        with:
          name: typescript-sdk
          path: sdk/output/typescript/
          retention-days: 7

  # STEP 4: Bump version (only if SDK built successfully)
  bump-version:
    needs: build-sdk
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
      version_changed: ${{ steps.bump.outputs.version_changed }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Read current version
        id: current
        run: |
          CURRENT_VERSION=$(python -c "import json; print(json.load(open('version.json'))['version'])")
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $CURRENT_VERSION"

      - name: Bump version
        id: bump
        run: |
          python scripts/bump_version.py
          NEW_VERSION=$(python -c "import json; print(json.load(open('version.json'))['version'])")
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "New version: $NEW_VERSION"
          
          # Check if version actually changed
          if [ "${{ steps.current.outputs.current_version }}" != "$NEW_VERSION" ]; then
            echo "version_changed=true" >> $GITHUB_OUTPUT
          else
            echo "version_changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit version bump
        run: |
          git add version.json web-app/package.json core-api/src/financial_analysis/__init__.py core-api/src/financial_analysis/api/openapi_config.py core-api/src/financial_analysis/api/main.py
          if git diff --staged --quiet; then
            echo "No version changes to commit"
          else
            git commit -m "chore: bump version to ${{ steps.bump.outputs.new_version }} [skip ci]"
          fi

      - name: Create git tag
        run: |
          # Delete the tag if it already exists (in case of retry)
          git tag -d "v${{ steps.bump.outputs.new_version }}" 2>/dev/null || true
          git push origin --delete "v${{ steps.bump.outputs.new_version }}" 2>/dev/null || true
          # Create the tag
          git tag "v${{ steps.bump.outputs.new_version }}"
          echo "✓ Created tag v${{ steps.bump.outputs.new_version }}"

      - name: Push changes
        run: |
          git push origin main --tags
          echo "✓ Pushed version bump and tag"

  # STEP 5a: Publish SDK to npm (runs in parallel with collection and spec publishing)
  publish-sdk:
    needs: bump-version
    if: needs.bump-version.outputs.version_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main  # Get the latest commit with version bump

      - name: Download SDK artifact
        uses: actions/download-artifact@v4
        with:
          name: typescript-sdk
          path: sdk/output/typescript/

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Update SDK version
        working-directory: sdk/output/typescript
        run: |
          # Update package.json version to match the bumped version
          npm version ${{ needs.bump-version.outputs.new_version }} --no-git-tag-version --allow-same-version
          echo "✓ Updated SDK version to ${{ needs.bump-version.outputs.new_version }}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Install SDK dependencies
        working-directory: sdk/output/typescript
        run: npm install
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Build SDK
        working-directory: sdk/output/typescript
        run: npm run build
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm
        working-directory: sdk/output/typescript
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # STEP 5b: Publish OpenAPI spec to Postman Spec Hub AND generate collection from it
  # This replaces the old create-postman-collection job - now collection is generated from spec
  # to ensure it always stays in sync with the actual API
  publish-spec-and-collection:
    needs: bump-version
    if: needs.bump-version.outputs.version_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main  # Get the latest commit with version bump

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Download OpenAPI spec artifact
        uses: actions/download-artifact@v4
        with:
          name: openapi-spec
          path: sdk/

      - name: Publish spec and generate collection
        id: publish-spec
        run: |
          python dev-tools/publish_spec.py \
            --workspace-id "${{ secrets.POSTMAN_WORKSPACE_ID }}" \
            --spec-file "sdk/openapi.json" \
            --version "${{ needs.bump-version.outputs.new_version }}" \
            --generate-collection \
            --output-file postman_info.json
        env:
          POSTMAN_API_KEY: ${{ secrets.POSTMAN_API_KEY }}

      - name: Upload Postman info
        uses: actions/upload-artifact@v4
        with:
          name: postman-info
          path: postman_info.json

      - name: Summary
        run: |
          echo "## 📋 Postman Assets Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${{ needs.bump-version.outputs.new_version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Spec Hub**: Published ✓" >> $GITHUB_STEP_SUMMARY
          echo "- **Collection**: Generated from spec ✓" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f postman_info.json ]; then
            SPEC_ID=$(jq -r '.spec.id' postman_info.json)
            COLLECTION_ID=$(jq -r '.collection.id // empty' postman_info.json)
            echo "### Links" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "🔗 **Spec**: [Postman Spec Hub](https://app.postman.com/workspace/${{ secrets.POSTMAN_WORKSPACE_ID }}/specs/${SPEC_ID})" >> $GITHUB_STEP_SUMMARY
            if [ -n "$COLLECTION_ID" ]; then
              echo "📦 **Collection**: [Postman Collection](https://app.postman.com/workspace/${{ secrets.POSTMAN_WORKSPACE_ID }}/collection/${COLLECTION_ID})" >> $GITHUB_STEP_SUMMARY
            fi
          fi
