# spearmint/api-gateway/nginx.conf

upstream core_api {
    server core-api:8000;
}

upstream web_app {
    server web-app:5173;  # Vite dev server port
}

server {
    listen 8080;

    # Proxy /api requests to the Backend
    location /api/ {
        proxy_pass http://core_api/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy /docs (Swagger UI) to the Backend
    location /docs {
        proxy_pass http://core_api/api/docs;
        proxy_set_header Host $host;
    }

    # Proxy /openapi.json to the Backend
    location /openapi.json {
        proxy_pass http://core_api/api/openapi.json;
        proxy_set_header Host $host;
    }

    # All other traffic goes to the Frontend (Web App)
    location / {
        proxy_pass http://web_app/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # WebSocket support for Vite HMR (Hot Module Replacement)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;  # 24 hours for WebSocket connections
    }
}